# nanodet-plus-m_640 — DL field detector (30 classes), input 640x640
save_dir: workspace/dlscan-nanodet-640
model:
  weight_averager: {name: ExpMovingAverager, decay: 0.9998}
  arch:
    name: NanoDetPlus
    detach_epoch: 10
    backbone: {name: ShuffleNetV2, model_size: 1.0x, out_stages: [2,3,4], activation: LeakyReLU}
    fpn: {name: GhostPAN, in_channels: [116,232,464], out_channels: 96, kernel_size: 5, num_extra_level: 1, use_depthwise: True, activation: LeakyReLU}
    head:
      name: NanoDetPlusHead
      num_classes: 30
      input_channel: 96
      feat_channels: 96
      stacked_convs: 2
      kernel_size: 5
      strides: [8,16,32,64]
      activation: LeakyReLU
      reg_max: 7
      norm_cfg: {type: BN}
      loss:
        loss_qfl: {name: QualityFocalLoss, use_sigmoid: True, beta: 2.0, loss_weight: 1.0}
        loss_dfl: {name: DistributionFocalLoss, loss_weight: 0.25}
        loss_bbox: {name: GIoULoss, loss_weight: 2.0}
    aux_head: {name: SimpleConvHead, num_classes: 30, input_channel: 192, feat_channels: 192, stacked_convs: 4, strides: [8,16,32,64], activation: LeakyReLU, reg_max: 7}
data:
  train:
    name: CocoDataset
    img_path: __SET_BY_LAUNCHER__
    ann_path: __SET_BY_LAUNCHER__
    input_size: [640,640]
    keep_ratio: False
    pipeline:
      perspective: 0.0
      scale: [0.6, 1.4]
      stretch: [[0.8,1.2],[0.8,1.2]]
      rotation: 0
      shear: 0
      translate: 0.2
      flip: 0.0
      brightness: 0.2
      contrast: [0.6,1.4]
      saturation: [0.5,1.2]
      normalize: [[103.53,116.28,123.675],[57.375,57.12,58.395]]
  val:
    name: CocoDataset
    img_path: __SET_BY_LAUNCHER__
    ann_path: __SET_BY_LAUNCHER__
    input_size: [640,640]
    keep_ratio: False
    pipeline:
      normalize: [[103.53,116.28,123.675],[57.375,57.12,58.395]]
device:
  gpu_ids: [0]
  workers_per_gpu: 8
  batchsize_per_gpu: 24
  precision: 32
schedule:
  optimizer: {name: AdamW, lr: 0.001, weight_decay: 0.05}
  warmup: {name: linear, steps: 500, ratio: 0.0001}
  total_epochs: 40
  lr_schedule: {name: CosineAnnealingLR, T_max: 40, eta_min: 0.00005}
  val_intervals: 5
grad_clip: 35
evaluator: {name: CocoDetectionEvaluator, save_key: mAP}
log: {interval: 100}
class_names: ['birthday','card_num1','card_num2','country','donor','expire_date','face','gender','ghostimg','given_name','list_1','list_12','list_15','list_16','list_17','list_18','list_19','list_2','list_3','list_3c','list_4a','list_4b','list_4d','list_5','list_8f','list_8s','list_9','list_9a','personal_num','surname']
