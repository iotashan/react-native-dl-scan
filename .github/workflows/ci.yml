name: CI

on:
  push:
  pull_request:

jobs:
  node:
    name: JS / TS (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn'
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn lint
      - run: yarn test --ci

  cpp:
    name: C++ shared core (GoogleTest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build cpp/build
      - run: ctest --test-dir cpp/build --output-on-failure

  ios:
    name: iOS — SPM + Pod compat
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: corepack enable
      - run: yarn install --immutable
      - run: swift package describe
      - run: swift build --target DLScanCxx
      - run: pod lib lint DLScan.podspec --quick --allow-warnings

  android:
    name: Android — script validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: corepack enable
      - run: yarn install --immutable
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate Android scripts (syntax-only)
        run: |
          # Validate that required Android source files are present.
          # We can't run a real `gradle assembleDebug` from this repo because
          # the library depends on `project(":react-native-nitro-modules")`
          # which only resolves inside a consumer app's multi-project build.
          # Adding an example/ app is a follow-up workstream.

          test -f android/build.gradle
          test -f android/CMakeLists.txt
          test -f android/src/main/AndroidManifest.xml
          test -f android/src/main/java/com/margelo/nitro/dlscan/HybridDLScanAndroid.kt
          test -f android/src/main/cpp/dlscan_jni_bridge.cpp
          test -f android/src/main/assets/dl_scan_field_detector.tflite

          echo "Android scripts present. Real build requires consumer-app context (deferred to follow-up)."

  parity:
    name: Field-detector parity smoke test (Core ML int8 vs TFLite int8)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync export-android env (torch + ultralytics + coremltools + tflite)
        run: |
          cd model-training/envs/export-android
          uv sync --frozen

      - name: Run parity smoke test
        run: |
          # The .pt baseline weights are gitignored under runs/ so CI uses
          # --skip-pt; the .mlpackage + .tflite shipped in the repo are
          # what consumers actually load at runtime, so this gate validates
          # the production artifacts against the held-out fixture.
          export YOLO_AUTOINSTALL=False
          bash model-training/scripts/parity_check.sh --skip-pt
